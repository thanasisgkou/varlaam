backend:
  name: git-gateway
  branch: master

# Local development: when true and `npx decap-server` is running on port 8081,
# the CMS edits files on disk directly. Has no effect in production unless the
# proxy server is reachable. REMOVE before production launch to be safe.
local_backend: true

locale: 'el'

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "Νέα & Ανακοινώσεις"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Περίληψη", name: "excerpt", widget: "string" }
      - { label: "Εικόνα", name: "image", widget: "image", required: false }
      - { label: "Συντάκτης", name: "author", widget: "string", default: "Σύλλογος Βαρλαάμ" }
      - { label: "Κείμενο", name: "body", widget: "markdown" }

  - name: "events"
    label: "Εκδηλώσεις"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Τέλος", name: "endDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Τοποθεσία", name: "location", widget: "string" }
      - { label: "Περίληψη", name: "excerpt", widget: "string" }
      - { label: "Εικόνα", name: "image", widget: "image", required: false }
      - { label: "Κείμενο", name: "body", widget: "markdown" }

  - name: "gallery-albums"
    label: "Γκαλερί — Άλμπουμ Εκδηλώσεων"
    folder: "src/content/gallery-albums"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{year}} · {{title}}"
    fields:
      - { label: "Τίτλος (EL)", name: "title", widget: "string" }
      - { label: "Τίτλος (EN)", name: "titleEn", widget: "string", required: false }
      - { label: "Έτος", name: "year", widget: "number", value_type: "int", min: 1900, max: 2100 }
      - label: "Θέμα"
        name: "theme"
        widget: "select"
        options:
          - { label: "🎉 Πανηγύρια & Γιορτές", value: "feast" }
          - { label: "🎂 Εκδηλώσεις Συλλόγου", value: "celebration" }
          - { label: "🏘️ Το Χωριό", value: "village" }
          - { label: "📂 Άλλο", value: "other" }
      - { label: "Σειρά εμφάνισης", name: "order", widget: "number", default: 0, value_type: "int", hint: "Όσο μικρότερος αριθμός, τόσο νωρίτερα εμφανίζεται μέσα στο ίδιο έτος" }
      - { label: "Περιγραφή (EL)", name: "description", widget: "text", required: false }
      - { label: "Περιγραφή (EN)", name: "descriptionEn", widget: "text", required: false }
      - { label: "Εξώφυλλο (cover)", name: "cover", widget: "image", required: false, hint: "Αν αφεθεί κενό, χρησιμοποιείται η πρώτη φωτογραφία" }
      - label: "Φωτογραφίες"
        name: "photos"
        widget: "list"
        summary: "{{fields.image}}"
        min: 1
        fields:
          - { label: "Εικόνα", name: "image", widget: "image" }
          - { label: "Λεζάντα (EL)", name: "caption", widget: "string", required: false }
          - { label: "Λεζάντα (EN)", name: "captionEn", widget: "string", required: false }

  - name: "attractions"
    label: "Αξιοθέατα"
    folder: "src/content/attractions"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Slug", name: "slug", widget: "string", hint: "π.χ. xirovouni — χωρίς κενά ή ελληνικά" }
      - { label: "Τίτλος (EL)", name: "title", widget: "string" }
      - { label: "Τίτλος (EN)", name: "titleEn", widget: "string" }
      - { label: "Σειρά εμφάνισης", name: "order", widget: "number", default: 0, value_type: "int" }
      - { label: "Περίληψη (EL)", name: "summary", widget: "text" }
      - { label: "Περίληψη (EN)", name: "summaryEn", widget: "text" }
      - { label: "Κείμενο (EL)", name: "body", widget: "text" }
      - { label: "Κείμενο (EN)", name: "bodyEn", widget: "text" }
      - label: "GPS"
        name: "gps"
        widget: "object"
        required: false
        fields:
          - { label: "Lat", name: "lat", widget: "number", value_type: "float" }
          - { label: "Lng", name: "lng", widget: "number", value_type: "float" }
      - { label: "Εξωτερικός σύνδεσμος", name: "externalUrl", widget: "string", required: false }
      - { label: "Φάκελος φωτογραφιών", name: "photoFolder", widget: "string", hint: "π.χ. /images/attractions/xirovouni" }
      - { label: "Αριθμός φωτογραφιών", name: "photoCount", widget: "number", default: 0, value_type: "int" }

  - name: "diaspora-stories"
    label: "Ιστορίες Αποδήμων"
    folder: "src/content/diaspora-stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Όνομα", name: "name", widget: "string" }
      - { label: "Τοποθεσία", name: "location", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Περίληψη", name: "excerpt", widget: "string" }
      - { label: "Φωτογραφία", name: "image", widget: "image", required: false }
      - { label: "Ιστορία", name: "body", widget: "markdown" }

  - name: "diaspora-bulletin"
    label: "Πίνακας Ανακοινώσεων Αποδήμων"
    folder: "src/content/diaspora-bulletin"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - { label: "Συντάκτης", name: "author", widget: "string" }
      - { label: "Ημερομηνία", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Εγκεκριμένο", name: "approved", widget: "boolean", default: false }
      - { label: "Κείμενο", name: "body", widget: "markdown" }

  - name: "memories"
    label: "Αναμνήσεις"
    folder: "src/content/memories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Τίτλος", name: "title", widget: "string" }
      - label: "Κατηγορία"
        name: "category"
        widget: "select"
        options:
          - { label: "🌞 Καλοκαίρια στο χωριό", value: "summer" }
          - { label: "❄️ Χειμώνες με χιόνι", value: "winter" }
          - { label: "🃏 Ο καλύτερος στη δηλωτή", value: "dhloti" }
          - { label: "📛 Τα παρατσούκλια", value: "nicknames" }
          - { label: "🗣️ Μιλάς Βαρλαμίτικα;", value: "dialect" }
          - { label: "🎤 Πρώτη φορά", value: "first-time" }
      - { label: "Αφηγητής", name: "author", widget: "string", default: "Ανώνυμος/η" }
      - { label: "Τοποθεσία", name: "authorLocation", widget: "string", required: false, hint: "π.χ. κάτοικος, Αθήνα, Μόναχο" }
      - { label: "Χρονολογία", name: "year", widget: "string", required: false, hint: "π.χ. 1985, δεκαετία '70" }
      - { label: "Εικόνα", name: "image", widget: "image", required: false }
      - { label: "Εγκεκριμένο", name: "approved", widget: "boolean", default: false, hint: "Γίνε true μόνο αφού ελέγξεις το κείμενο" }
      - { label: "Ημ. υποβολής", name: "submittedAt", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Κείμενο", name: "body", widget: "markdown" }
